<text x="1110" y="383" class="num" font-size="56" fill="#26343d">359 days</text>
<text x="70" y="500" class="title" font-size="30" fill="#20282f">Patient and NeuroTrax Overview</text>
<rect x="70" y="535" width="455" height="108" rx="16" fill="#ffffff" stroke="#d6d0c4"/>
<text x="94" y="570" class="sans" font-size="17" font-weight="800" fill="#555f67">Patients total</text>
<text x="94" y="621" class="num" font-size="46" fill="#26343d">83</text>
<rect x="575" y="535" width="455" height="108" rx="16" fill="#ffffff" stroke="#d6d0c4"/>
<text x="599" y="570" class="sans" font-size="17" font-weight="800" fill="#555f67">Patients with T1</text>
<text x="599" y="621" class="num" font-size="46" fill="#26343d">83</text>
<rect x="1080" y="535" width="455" height="108" rx="16" fill="#ffffff" stroke="#d6d0c4"/>
<text x="1104" y="570" class="sans" font-size="17" font-weight="800" fill="#555f67">Patients with T1 + T2</text>
<text x="1104" y="621" class="num" font-size="46" fill="#26343d">62</text>
