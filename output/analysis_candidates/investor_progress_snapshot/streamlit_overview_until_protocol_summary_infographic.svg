<text x="88" y="1537" class="sans" font-size="13" fill="#6a737b">global_T1, global_T2, global_delta</text>
<rect x="447" y="1490" width="335" height="62" rx="12" fill="#ffffff" stroke="#d6d0c4"/>
<text x="465" y="1514" class="sans" font-size="19" font-weight="900" fill="#26343d">Memory</text>
<text x="465" y="1537" class="sans" font-size="13" fill="#6a737b">memory_T1, memory_T2, memory_delta</text>
