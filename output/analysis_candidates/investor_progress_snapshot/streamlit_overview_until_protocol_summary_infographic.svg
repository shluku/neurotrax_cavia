<rect x="824" y="875" width="335" height="110" rx="16" fill="#ffffff" stroke="#d6d0c4"/>
<text x="846" y="910" class="sans" font-size="16" font-weight="800" fill="#555f67">Selected features</text>
<text x="846" y="963" class="num" font-size="48" fill="#31424a">29</text>
<rect x="1201" y="875" width="335" height="110" rx="16" fill="#ffffff" stroke="#d6d0c4"/>
<text x="1223" y="910" class="sans" font-size="16" font-weight="800" fill="#555f67">Inventory rows</text>
<text x="1223" y="963" class="num" font-size="48" fill="#31424a">44</text>
<text x="70" y="1057" class="title" font-size="30" fill="#20282f">Two Main Project Outcomes</text>
<rect x="70" y="1092" width="705" height="124" rx="16" fill="#ffffff" stroke="#d6d0c4"/>
<circle cx="112" cy="1138" r="24" fill="#59656e"/>
<text x="104" y="1147" class="title" font-size="25" fill="#ffffff">1</text>
<text x="152" y="1132" class="sans" font-size="20" font-weight="900" fill="#26343d">T1 baseline digital phenotype</text>
<text x="152" y="1162" class="sans" font-size="15" fill="#59636b">Describe smartphone-derived behavior/context around the first cognitive</text>
<text x="152" y="1182" class="sans" font-size="15" fill="#59636b">assessment and later test prediction of NeuroTrax T1 score.</text>
<rect x="825" y="1092" width="705" height="124" rx="16" fill="#ffffff" stroke="#d6d0c4"/>
<circle cx="867" cy="1138" r="24" fill="#59656e"/>
<text x="859" y="1147" class="title" font-size="25" fill="#ffffff">2</text>
<text x="907" y="1132" class="sans" font-size="20" font-weight="900" fill="#26343d">T1-to-T2 digital phenotype delta</text>
<text x="907" y="1162" class="sans" font-size="15" fill="#59636b">Quantify digital changes between visits and later test whether they</text>
<text x="907" y="1182" class="sans" font-size="15" fill="#59636b">help predict NeuroTrax T2 cognitive outcome.</text>
<text x="70" y="1282" class="title" font-size="30" fill="#20282f">Experiment Time Span</text>
<rect x="70" y="1317" width="455" height="84" rx="15" fill="#ffffff" stroke="#d6d0c4"/>
<text x="94" y="1348" class="sans" font-size="16" font-weight="800" fill="#555f67">First T1</text>
<text x="94" y="1381" class="title" font-size="25" fill="#26343d">2025-01-05</text>
<rect x="575" y="1317" width="455" height="84" rx="15" fill="#ffffff" stroke="#d6d0c4"/>
<text x="599" y="1348" class="sans" font-size="16" font-weight="800" fill="#555f67">Last T2</text>
<text x="599" y="1381" class="title" font-size="25" fill="#26343d">2025-12-30</text>
<rect x="1080" y="1317" width="455" height="84" rx="15" fill="#ffffff" stroke="#d6d0c4"/>
