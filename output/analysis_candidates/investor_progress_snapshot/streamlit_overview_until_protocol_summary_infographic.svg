<text x="842" y="1537" class="sans" font-size="13" fill="#6a737b">ef_T1, ef_T2, ef_delta</text>
<rect x="1201" y="1490" width="335" height="62" rx="12" fill="#ffffff" stroke="#d6d0c4"/>
