<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8aa29e"/><stop offset="1" stop-color="#c9b27d"/></linearGradient>
<style> .title{font-family:Arial Black,Arial,sans-serif;font-weight:900}.sans{font-family:Arial,Helvetica,sans-serif}.num{font-family:Impact,Arial Black,Arial,sans-serif;letter-spacing:.5px}</style>
</defs>
<rect width="100%" height="100%" fill="#f6f4ef"/>
<rect x="0" y="0" width="1600" height="190" fill="url(#hero)"/>
<text x="70" y="76" class="title" font-size="42" fill="#ffffff">NeuroTrax SensorDB CAVIA</text>
<text x="70" y="120" class="sans" font-size="22" fill="#dbe3e7">Project overview: cognitive assessments + large-scale smartphone SQL digital phenotyping</text>
<text x="70" y="160" class="sans" font-size="18" fill="#edf2f4">A growing pipeline for a rich digital biomarker model: baseline phenotype and T1-to-T2 change phenotype.</text>
<text x="70" y="250" class="title" font-size="34" fill="#20282f">Data Scale First</text>
<rect x="70" y="285" width="455" height="142" rx="18" fill="#ffffff" stroke="#d6d0c4"/>
<rect x="70" y="285" width="12" height="142" rx="6" fill="url(#accent)"/>
<text x="100" y="325" class="sans" font-size="19" font-weight="900" fill="#555f67">Raw data scale</text>
<text x="100" y="383" class="num" font-size="56" fill="#26343d">10 TB</text>
<text x="100" y="409" class="sans" font-size="13" fill="#6a737b">approximate project storage scale</text>
<rect x="575" y="285" width="455" height="142" rx="18" fill="#ffffff" stroke="#d6d0c4"/>
<rect x="575" y="285" width="12" height="142" rx="6" fill="url(#accent)"/>
<text x="605" y="325" class="sans" font-size="19" font-weight="900" fill="#555f67">Approx. per patient</text>
<text x="605" y="383" class="num" font-size="56" fill="#26343d">122 GB</text>
<text x="605" y="409" class="sans" font-size="13" fill="#6a737b">10 TB divided across NeuroTrax patients</text>
<rect x="1080" y="285" width="455" height="142" rx="18" fill="#ffffff" stroke="#d6d0c4"/>
<rect x="1080" y="285" width="12" height="142" rx="6" fill="url(#accent)"/>
