<text x="718" y="582" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Count transitions where text length decreases</text>
<text x="56" y="660" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#2b2f33">Example calculated keyboard values</text>
