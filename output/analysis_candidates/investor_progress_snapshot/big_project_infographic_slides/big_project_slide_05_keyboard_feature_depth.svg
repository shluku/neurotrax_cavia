<text x="74" y="472" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2b2f33">keyboard_long_pause_count_2s</text>
<text x="74" y="494" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Count gaps greater than 2 seconds between consecutive keyboard</text>
<text x="74" y="510" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">observations inside active typing</text>
<rect x="700" y="448" width="600" height="70" rx="8" fill="#ffffff" stroke="#d8d8d2"/>
<text x="718" y="472" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#2b2f33">keyboard_typing_burst_count</text>
