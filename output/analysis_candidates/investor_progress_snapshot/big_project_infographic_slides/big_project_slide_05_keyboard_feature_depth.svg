<text x="500" y="777" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">keyboard_median_word_completion_time_ms</text>
<text x="500" y="798" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#2f3a42">2,339.5</text>
