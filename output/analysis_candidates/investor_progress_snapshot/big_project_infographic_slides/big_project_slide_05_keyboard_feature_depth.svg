<text x="718" y="406" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">IQR of milliseconds between consecutive deduplicated keyboard</text>
<text x="718" y="422" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">observations</text>
