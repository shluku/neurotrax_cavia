<text x="88" y="825" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• rotation</text>
<text x="378" y="825" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• screen</text>
<text x="668" y="825" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• significant</text>
<text x="958" y="825" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• telephony</text>
