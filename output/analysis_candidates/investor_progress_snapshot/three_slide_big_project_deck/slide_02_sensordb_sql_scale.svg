<text x="1248" y="771" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• magnetometer</text>
<text x="88" y="798" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• messages</text>
<text x="378" y="798" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• network</text>
<text x="668" y="798" font-family="Arial, sans-serif" font-size="13" fill="#22272b">• network_traffic</text>
