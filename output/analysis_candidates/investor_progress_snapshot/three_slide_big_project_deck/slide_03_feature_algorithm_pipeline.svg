<text x="76" y="258" font-family="Arial, sans-serif" font-size="12" fill="#626b73">Manual scientific review</text>
<rect x="364" y="150" width="282" height="126" rx="10" fill="#ffffff" stroke="#d7d7cf"/>
<text x="382" y="181" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#4b5359">Candidate definitions</text>
