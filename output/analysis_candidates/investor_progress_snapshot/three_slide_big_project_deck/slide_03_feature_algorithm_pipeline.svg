<text x="688" y="258" font-family="Arial, sans-serif" font-size="12" fill="#626b73">Chosen for extraction</text>
<rect x="976" y="150" width="282" height="126" rx="10" fill="#ffffff" stroke="#d7d7cf"/>
<text x="994" y="181" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#4b5359">Calculated values</text>
<text x="994" y="232" font-family="Arial, sans-serif" font-size="38" font-weight="800" fill="#28323a">27</text>
